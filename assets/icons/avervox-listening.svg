<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Listening: red background, white mic -->
  <circle cx="24" cy="24" r="22" fill="#cc2222" opacity="0.95"/>
  <!-- Pulse ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#ff6666" stroke-width="2" opacity="0.5"/>
  <!-- Mic body -->
  <rect x="19" y="10" width="10" height="16" rx="5" fill="white"/>
  <!-- Mic stand -->
  <path d="M15 24 Q15 34 24 34 Q33 34 33 24" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Pole -->
  <line x1="24" y1="34" x2="24" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="19" y1="40" x2="29" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
